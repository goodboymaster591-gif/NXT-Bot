services:
  - type: web
    name: nxt-discord-bot
    runtime: node
    buildCommand: npm install --prefix artifacts/discord-bot
    startCommand: node artifacts/discord-bot/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: SESSION_SECRET
        sync: false
